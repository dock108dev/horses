services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: derby-api
    ports:
      - "8000:8000"
    environment:
      # Comma-separated allow-list. The wildcard "*" is rejected at startup
      # (see api/main.py and docs/audits/security-report.md S1), so the
      # default lists the LAN origins the iPad will hit. Override via .env
      # for Tailscale or other hostnames.
      - API_CORS_ORIGINS=${API_CORS_ORIGINS:-http://localhost:3000,http://mac-mini.local:3000}
    volumes:
      # Persist SQLite snapshots and any cached data across restarts.
      - ./data:/data
      # Mount fixture cards / odds read-only so PICK5_DATA_MODE=fixture
      # and ?source=fixture can serve the offline workflow inside the
      # container. See api/sources/fixture.py.
      - ./fixtures:/app/fixtures:ro
    networks:
      - derby
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: derby-web
    ports:
      - "3000:3000"
    environment:
      # Server-side calls from Next.js use the docker network hostname.
      # Browser-side calls hit the same-origin /api proxy defined in
      # web/next.config.mjs, so no public base URL is needed here.
      - API_BASE_URL=${API_BASE_URL:-http://api:8000}
    depends_on:
      - api
    networks:
      - derby
    restart: unless-stopped

networks:
  derby:
    driver: bridge
